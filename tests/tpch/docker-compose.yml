# Minimal stack for iceberg-diff TPC-H integration test: MinIO (S3-compatible
# storage) + iceberg-rest (JDBC-backed REST catalog). No postgres, no
# pg2iceberg — the test generates TPC-H data locally with tpchgen-cli and
# writes to Iceberg via iceberg-rust, avoiding a circular dependency on the
# pipeline iceberg-diff is meant to validate.
#
# Ports are offset from the main pg2iceberg compose so both can run in parallel.

services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "59000:9000"
      - "59001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 30

  create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 admin password;
      mc mb --ignore-existing myminio/warehouse;
      exit 0;
      "

  iceberg-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iceberg_catalog
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg"]
      interval: 2s
      timeout: 5s
      retries: 30

  iceberg-rest:
    build: ../../../pg2iceberg/iceberg-rest
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://iceberg-postgres:5432/iceberg_catalog
      CATALOG_JDBC_USER: iceberg
      CATALOG_JDBC_PASSWORD: iceberg
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "58181:8181"
    depends_on:
      iceberg-postgres:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
