# pg2iceberg config for snapshot A. The B config is identical except for
# `sink.namespace`.

source:
  postgres:
    host: 127.0.0.1
    port: 55432
    database: tpch
    user: postgres
    password: postgres

sink:
  catalog_uri: http://127.0.0.1:58181
  catalog_auth: none
  namespace: tpch_a
  warehouse: s3://warehouse/
  credential_mode: static
  s3_endpoint: http://127.0.0.1:59000
  s3_access_key: admin
  s3_secret_key: password
  s3_region: us-east-1

tables:
  - name: public.region
  - name: public.nation
  - name: public.part
  - name: public.supplier
  - name: public.partsupp
  - name: public.customer
  - name: public.orders
  - name: public.lineitem
